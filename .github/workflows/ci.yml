name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check out base commit for breaking change detection
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v5
        with:
          path: .breaking-base
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Buf
        uses: bufbuild/buf-action@v1
        with:
          version: "1.66.1"
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check proto build
        run: buf build --error-format github-actions

      - name: Check proto formatting
        run: make proto-format-check

      - name: Check proto lint
        run: buf lint --error-format github-actions

      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        run: buf breaking --error-format github-actions --against .breaking-base

      - name: Run Go tests
        run: go test ./...

      - name: Check generated Go code
        run: make proto-check-generated
