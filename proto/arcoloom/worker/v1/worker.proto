syntax = "proto3";

package arcoloom.worker.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/arcoloom/arco-proto/gen/go/arcoloom/worker/v1;workerv1";

service WorkerService {
  rpc Connect(stream WorkerToControl) returns (stream ControlToWorker);
  rpc ConnectTerminal(stream WorkerTerminalToControl) returns (stream ControlToWorkerTerminal);
}

enum RuntimeKind {
  RUNTIME_KIND_UNSPECIFIED = 0;
  RUNTIME_KIND_CONTAINER = 1;
  RUNTIME_KIND_EXEC = 2;
}

enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_PREPARING = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_SUCCESS = 3;
  TASK_STATE_FAILED = 4;
  TASK_STATE_STOPPING = 5;
  TASK_STATE_INTERRUPTED = 6;
}

enum SignalType {
  SIGNAL_TYPE_UNSPECIFIED = 0;
  SIGNAL_TYPE_SPOT_RECLAIM_RISK = 1;
  SIGNAL_TYPE_NODE_UNHEALTHY = 2;
}

enum LogSource {
  LOG_SOURCE_UNSPECIFIED = 0;
  LOG_SOURCE_WORKER = 1;
  LOG_SOURCE_PROGRAM = 2;
}

enum LogStream {
  LOG_STREAM_UNSPECIFIED = 0;
  LOG_STREAM_STDOUT = 1;
  LOG_STREAM_STDERR = 2;
}

message Hello {
  string instance_id = 1;
  string provider = 2;
  string registration_token = 3;
  string worker_version = 4;
}

message HelloAck {
  string worker_id = 1;
  string terminal_session_token = 2;
  string cloud_vendor = 3;
  string instance_type = 4;
  string region = 5;
  string availability_zone = 6;
}

message Assignment {
  string task_id = 1;
  RuntimeKind runtime_kind = 2;
  string payload = 3;
}

message StatusUpdate {
  string task_id = 1;
  TaskState state = 2;
  string message = 3;
}

message Signal {
  string task_id = 1;
  SignalType signal_type = 2;
  string detail = 3;
  google.protobuf.Timestamp shutdown_at = 4;
}

message TaskLog {
  string task_id = 1;
  LogSource source = 2;
  LogStream stream = 3;
  string line = 4;
  uint64 sequence = 5;
}

message Heartbeat {
  string worker_id = 1;
}

message Shutdown {
  string reason = 1;
}

message TerminalHello {
  string instance_id = 1;
  string provider = 2;
  string registration_token = 3;
  string worker_version = 4;
  string terminal_session_token = 5;
}

message TerminalHelloAck {
  string worker_id = 1;
}

message TerminalOpenShell {
  string session_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
}

message TerminalInput {
  string session_id = 1;
  bytes data = 2;
}

message TerminalResize {
  string session_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
}

message TerminalClose {
  string session_id = 1;
  string reason = 2;
}

message TerminalReady {
  string session_id = 1;
}

message TerminalOutput {
  string session_id = 1;
  bytes data = 2;
}

message TerminalExit {
  string session_id = 1;
  int32 exit_code = 2;
  string message = 3;
}

message TerminalError {
  string session_id = 1;
  string message = 2;
}

message WorkerToControl {
  oneof message {
    Hello hello = 1;
    StatusUpdate status = 2;
    Signal signal = 3;
    Heartbeat heartbeat = 4;
    TaskLog log = 5;
  }
}

message ControlToWorker {
  oneof message {
    HelloAck hello_ack = 1;
    Assignment assignment = 2;
    Shutdown shutdown = 3;
  }
}

message WorkerTerminalToControl {
  oneof message {
    TerminalHello hello = 1;
    TerminalReady ready = 2;
    TerminalOutput output = 3;
    TerminalExit exit = 4;
    TerminalError error = 5;
  }
}

message ControlToWorkerTerminal {
  oneof message {
    TerminalHelloAck hello_ack = 1;
    TerminalOpenShell open_shell = 2;
    TerminalInput input = 3;
    TerminalResize resize = 4;
    TerminalClose close = 5;
  }
}
