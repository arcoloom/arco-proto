syntax = "proto3";

package arcoloom.ee.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/arcoloom/arco-proto/gen/go/arcoloom/ee/v1;eev1";

service EcoEngine {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc Plan(PlanRequest) returns (PlanResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  string service = 1;
  string version = 2;
  reserved 3, 4;
  reserved "supported_providers", "supported_objectives";
  repeated PlanningMode supported_modes = 5;
  string engine_version = 6;
  repeated string active_rule_codes = 7;
}

message PlanRequest {
  string request_id = 1;
  PlanningMode mode = 2;
  TaskSpec task = 3;
  TaskRuntimeState runtime = 4;
  MarketSnapshot market = 5;
  repeated AccountLimit account_limits = 6;
}

message PlanResponse {
  Decision decision = 1;
  repeated Explanation explanations = 2;
}

enum PlanningMode {
  PLANNING_MODE_UNSPECIFIED = 0;
  PLANNING_MODE_CREATE = 1;
  PLANNING_MODE_REPLAN = 2;
}

enum PerformanceProfile {
  PERFORMANCE_PROFILE_UNSPECIFIED = 0;
  PERFORMANCE_PROFILE_CHEAPEST = 1;
  PERFORMANCE_PROFILE_BALANCED = 2;
  PERFORMANCE_PROFILE_HIGH_PERF_CPU = 3;
}

enum Interruptibility {
  INTERRUPTIBILITY_UNSPECIFIED = 0;
  INTERRUPTIBILITY_RESTARTABLE = 1;
  INTERRUPTIBILITY_CHECKPOINTABLE = 2;
  INTERRUPTIBILITY_NON_INTERRUPTIBLE = 3;
}

enum NetworkProfile {
  NETWORK_PROFILE_UNSPECIFIED = 0;
  NETWORK_PROFILE_NORMAL = 1;
  NETWORK_PROFILE_EGRESS_HEAVY = 2;
}

enum WorkloadKind {
  WORKLOAD_KIND_UNSPECIFIED = 0;
  WORKLOAD_KIND_BATCH = 1;
  WORKLOAD_KIND_AI_TRAINING = 2;
  WORKLOAD_KIND_AI_INFERENCE = 3;
  WORKLOAD_KIND_SCIENTIFIC = 4;
  WORKLOAD_KIND_SINGLE = 5;
}

enum TaskPhase {
  TASK_PHASE_UNSPECIFIED = 0;
  TASK_PHASE_PENDING = 1;
  TASK_PHASE_RUNNING = 2;
  TASK_PHASE_MIGRATING = 3;
  TASK_PHASE_FINISHED = 4;
  TASK_PHASE_FAILED = 5;
}

enum SignalType {
  SIGNAL_TYPE_UNSPECIFIED = 0;
  SIGNAL_TYPE_PRICE_SURGE = 1;
  SIGNAL_TYPE_SPOT_RECLAIM_RISK = 2;
  SIGNAL_TYPE_API_THROTTLED = 3;
  SIGNAL_TYPE_NODE_UNHEALTHY = 4;
}

enum PricingModel {
  PRICING_MODEL_UNSPECIFIED = 0;
  PRICING_MODEL_ON_DEMAND = 1;
  PRICING_MODEL_SPOT = 2;
  PRICING_MODEL_RESERVED = 3;
}

enum DecisionAction {
  DECISION_ACTION_UNSPECIFIED = 0;
  DECISION_ACTION_LAUNCH = 1;
  DECISION_ACTION_KEEP = 2;
  DECISION_ACTION_MIGRATE = 3;
}

message TaskSpec {
  string task_id = 1;
  WorkloadKind workload_kind = 2;
  reserved 3;
  reserved "objective";
  SourceSpec source = 4;
  RunSpec run = 5;
  ResourceDemand resources = 6;
  map<string, string> labels = 7;
  google.protobuf.Timestamp submitted_at = 8;
  PerformanceProfile performance_profile = 9;
  Interruptibility interruptibility = 10;
  NetworkProfile network_profile = 11;
  google.protobuf.Timestamp ddl = 12;
}

message SourceSpec {
  string kind = 1;
  string uri = 2;
  string revision = 3;
  string path = 4;
}

message RunSpec {
  repeated string command = 1;
  map<string, string> env = 2;
  string work_dir = 3;
}

message ResourceDemand {
  uint32 cpu_milli = 1;
  uint32 memory_mib = 2;
  uint32 gpu_count = 3;
  uint32 ephemeral_disk_gib = 4;
}

message TaskRuntimeState {
  string execution_id = 1;
  TaskPhase phase = 2;
  Placement current_placement = 3;
  repeated PlanningSignal signals = 4;
  google.protobuf.Timestamp started_at = 5;
  uint64 retry_count = 6;
  string phase_detail = 7;
  reserved 8;
  reserved "progress_ratio";
}

message PlanningSignal {
  SignalType type = 1;
  string detail = 2;
  double severity = 3;
}

message MarketSnapshot {
  google.protobuf.Timestamp observed_at = 1;
  repeated ProviderOffering offerings = 2;
}

message ProviderOffering {
  string provider = 1;
  string region = 2;
  string zone = 3;
  string zone_id = 4;
  string instance_type = 5;
  PricingModel pricing_model = 6;
  uint32 cpu_milli = 7;
  uint32 memory_mib = 8;
  uint32 gpu_count = 9;
  double hourly_price_usd = 10;
  map<string, string> attributes = 13;
  string scope_id = 14;
  OfferingFacts facts = 15;
  reserved 11, 12;
}

message OfferingFacts {
  double effective_hourly_price_usd = 1;
  double cpu_perf_index = 2;
  double memory_perf_index = 3;
  double network_perf_index = 4;
  double capacity_score = 5;
  double launch_success_score = 6;
  double placement_health_score = 7;
  double spot_risk_score = 8;
  string family_class = 9;
  double generation_rank = 10;
  double memory_per_vcpu = 11;
  string architecture_class = 12;
  double provider_perf_baseline = 13;
}

message AccountLimit {
  string scope_id = 1;
  string provider = 2;
  string region = 3;
  string scope = 4;
  uint32 limit = 5;
  uint32 used = 6;
}

message Decision {
  string decision_id = 1;
  DecisionAction action = 2;
  Placement target = 3;
  CostEstimate cost = 4;
  string summary = 5;
  string score_version = 6;
  double total_score = 7;
  repeated ScoreComponent score_components = 8;
}

message Placement {
  string provider = 1;
  string scope_id = 2;
  string region = 3;
  string zone = 4;
  string zone_id = 5;
  string instance_type = 6;
  PricingModel pricing_model = 7;
  google.protobuf.Struct provider_config = 8;
}

message CostEstimate {
  string currency = 1;
  double effective_hourly_price = 2;
  double confidence = 3;
}

message Explanation {
  string code = 1;
  string message = 2;
}

message ScoreComponent {
  string code = 1;
  double score = 2;
  string detail = 3;
}
